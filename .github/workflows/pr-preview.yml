name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "frontend/**"
      - "docs/specs/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/

      - name: Build docs site
        working-directory: ${{ github.workspace }}/docs
        run: npm ci && npm run build
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/docs/

      - name: Copy docs site into dist
        working-directory: ${{ github.workspace }}
        run: cp -r docs/specs/.vitepress/dist frontend/dist/docs

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: frontend/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy
          qr-code: false

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove PR Preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: frontend/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
